<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Sun rays -->
  <g stroke="#FFD54F" stroke-width="2" stroke-linecap="round">
    <line x1="32" y1="2" x2="32" y2="8"/>
    <line x1="50" y1="6" x2="46" y2="11"/>
    <line x1="58" y1="18" x2="53" y2="21"/>
    <line x1="14" y1="6" x2="18" y2="11"/>
    <line x1="6" y1="18" x2="11" y2="21"/>
  </g>
  <!-- Panel frame -->
  <rect x="10" y="18" width="44" height="32" rx="3" fill="#1565C0" stroke="#90CAF9" stroke-width="1.5"/>
  <!-- Panel grid lines -->
  <line x1="10" y1="26" x2="54" y2="26" stroke="#90CAF9" stroke-width="0.8" opacity="0.6"/>
  <line x1="10" y1="34" x2="54" y2="34" stroke="#90CAF9" stroke-width="0.8" opacity="0.6"/>
  <line x1="10" y1="42" x2="54" y2="42" stroke="#90CAF9" stroke-width="0.8" opacity="0.6"/>
  <line x1="21" y1="18" x2="21" y2="50" stroke="#90CAF9" stroke-width="0.8" opacity="0.6"/>
  <line x1="32" y1="18" x2="32" y2="50" stroke="#90CAF9" stroke-width="0.8" opacity="0.6"/>
  <line x1="43" y1="18" x2="43" y2="50" stroke="#90CAF9" stroke-width="0.8" opacity="0.6"/>
  <!-- Stand -->
  <rect x="28" y="50" width="8" height="6" rx="1" fill="#90CAF9"/>
  <rect x="22" y="56" width="20" height="3" rx="1.5" fill="#90CAF9"/>
  <!-- Shine highlight -->
  <rect x="12" y="20" width="18" height="6" rx="1" fill="white" opacity="0.15"/>
</svg>
