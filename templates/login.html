<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in · Inverter Monitor</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='icons/solar-panel.svg') }}">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { color-scheme: dark; }
        html, body { color-scheme: dark; }
        ::placeholder { color: rgba(255,255,255,0.4); opacity: 1; }
        input { color-scheme: dark; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-gray-900 via-blue-900 to-indigo-900 flex items-center justify-center p-4">
    <div class="w-full max-w-sm bg-white/10 backdrop-blur-sm border border-white/10 rounded-2xl shadow-2xl p-6">
        <div class="text-center mb-6">
            <i class="fas fa-solar-panel text-yellow-300 text-3xl mb-2"></i>
            <h1 class="text-white text-xl font-bold">Inverter Monitor</h1>
            <p class="text-blue-200/80 text-xs mt-1">Sign in to continue</p>
        </div>

        {% if error %}
            <div class="mb-4 px-3 py-2 rounded-lg bg-red-500/15 border border-red-400/40 text-red-100 text-sm">
                {{ error }}
            </div>
        {% endif %}

        <form method="post" action="{{ url_for('auth.login') }}" autocomplete="off">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <label class="block text-white/70 text-xs mb-1">Username</label>
            <input type="text" name="username" required autofocus autocomplete="username"
                   class="w-full mb-3 px-3 py-2 rounded-lg bg-white/10 border border-white/20 text-white text-sm focus:outline-none focus:border-blue-400">

            <label class="block text-white/70 text-xs mb-1">Password</label>
            <input type="password" name="password" required autocomplete="current-password"
                   class="w-full mb-4 px-3 py-2 rounded-lg bg-white/10 border border-white/20 text-white text-sm focus:outline-none focus:border-blue-400">

            <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-lg transition-colors">
                Sign in
            </button>
        </form>
    </div>
</body>
</html>
